apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-crd-cr
  namespace: argocd
spec:
  project: default
  source:
    chart: gateway-helm
    repoURL: registry-1.docker.io/envoyproxy/gateway-helm
    targetRevision: v1.8.2
  destination:
    namespace: envoy-gateway-system
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
